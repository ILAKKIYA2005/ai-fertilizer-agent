server.port=${PORT:8080}
spring.application.name=fertilizer-agent

# Disable Flapdoodle embedded MongoDB in production
spring.mongodb.embedded.version=
spring.data.mongodb.uri=${MONGODB_URI}

# ChromaDB Configuration (Can point to dummy or unused since Groq handles it safely with empty embeddings)
chroma.api.url=${CHROMA_API_URL:http://localhost:8000}

# API Keys
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1
openweathermap.api.key=${OPENWEATHERMAP_API_KEY:}
