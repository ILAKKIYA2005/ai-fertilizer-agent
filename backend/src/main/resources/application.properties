server.port=8080
spring.application.name=fertilizer-agent

# Embedded MongoDB Configuration (Flapdoodle - no Docker needed)
spring.data.mongodb.database=fertilizer_db
de.flapdoodle.mongodb.embedded.version=5.0.22

# ChromaDB Configuration (Custom property to be used later)
chroma.api.url=http://localhost:8000

# API Keys
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1
openweathermap.api.key=${OPENWEATHERMAP_API_KEY:}
