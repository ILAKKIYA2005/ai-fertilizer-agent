server.port=${PORT:8080}
spring.application.name=fertilizer-agent

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/fertilizer_db}
spring.mongodb.embedded.enabled=${SPRING_MONGODB_EMBEDDED_ENABLED:true}

# ChromaDB Configuration (Custom property to be used later)
chroma.api.url=${CHROMA_API_URL:http://localhost:8000}

# API Keys
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1
openweathermap.api.key=${OPENWEATHERMAP_API_KEY:}
