server.port=8080
spring.application.name=fertilizer-agent

# Disable Flapdoodle embedded MongoDB in production
spring.mongodb.embedded.version=
# The spring-data-mongodb will look for `spring.data.mongodb.uri` which is set via docker-compose.yml

# ChromaDB Configuration (from docker-compose env vars or default)
chroma.api.url=${CHROMA_API_URL:http://chromadb:8000}

# API Keys (Must be set via environment variables in docker-compose.yml)
gemini.api.key=${GEMINI_API_KEY:}
groq.api.key=${GROQ_API_KEY:${GEMINI_API_KEY}}
groq.api.url=https://api.groq.com/openai/v1
openweathermap.api.key=${OPENWEATHERMAP_API_KEY:}
